services:
  panel:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./servers:/servers
    environment:
      DATABASE_URL: postgresql://opanel:opanel@postgres:5432/opanel
      JWT_SECRET: change-this-to-a-secure-random-string
      SERVERS_BASE_PATH: /servers
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: opanel
      POSTGRES_PASSWORD: opanel
      POSTGRES_DB: opanel
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opanel"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
