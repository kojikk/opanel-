services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: opanel
      POSTGRES_PASSWORD: opanel
      POSTGRES_DB: opanel
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: "--auth-host=trust"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opanel"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata_dev:
